<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#080d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEXUS Chat</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>

<style>
/* ═══════════════════════════════════════════════════════════════
   NEXUS Chat — Design System
   Palette: deep navy-black + electric cyan + violet neon
   Font: IBM Plex Sans Arabic (technical + Arabic harmony)
═══════════════════════════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
html, body {
  height: 100%; overflow: hidden;
  -webkit-text-size-adjust: 100%; text-size-adjust: 100%;
}
body {
  font-family: 'IBM Plex Sans Arabic', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #080d14; color: #dde4ee;
  user-select: none; -webkit-user-select: none;
  overscroll-behavior: none;
}
input, textarea { user-select: text; -webkit-user-select: text; }
img, svg { -webkit-user-drag: none; }
button { font-family: inherit; border: none; background: none; color: inherit; cursor: pointer; }
::-webkit-scrollbar { width: 0; height: 0; }
.scrollY { overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── Design Tokens ────────────────────────────────────────────── */
:root {
  --bg:          #080d14;
  --bg-1:        #0d1520;
  --bg-2:        #111d2b;
  --bg-3:        #162234;

  --cyan:        #00d4ff;
  --cyan-dim:    #0099bb;
  --violet:      #7c3aed;
  --violet-dim:  #5b21b6;
  --green:       #00e676;
  --danger:      #ff4757;
  --warn:        #ffa502;

  --text:        #dde4ee;
  --text-2:      #8899aa;
  --text-3:      #556677;

  --border:      rgba(0,212,255,.08);
  --border-2:    rgba(0,212,255,.15);

  --bubble-out:  #0d2e4a;
  --bubble-in:   #111d2b;

  --glow-cyan:   0 0 20px rgba(0,212,255,.25);
  --glow-violet: 0 0 20px rgba(124,58,237,.3);
  --glow-btn:    0 4px 24px rgba(0,212,255,.35);

  --r-sm:  8px;
  --r-md:  14px;
  --r-lg:  18px;
  --r-xl:  24px;
  --r-full:9999px;
}

/* ═══════════════════════════════════════════════════════════════
   SVG ICON SYSTEM — inline SVGs via CSS masks
═══════════════════════════════════════════════════════════════ */
.ic {
  display: inline-flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ic svg { width: 100%; height: 100%; }

/* ═══════════════════════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════════════════════ */
#app { position: fixed; inset: 0; display: flex; flex-direction: column; }

.screen {
  position: fixed; inset: 0; display: flex; flex-direction: column;
  background: var(--bg);
  transform: translateX(100%);
  transition: transform .28s cubic-bezier(.4, 0, .2, 1);
  z-index: 5;
}
.screen.active { transform: translateX(0); }
#screen-auth, #screen-chats { transform: translateX(0); transition: none; z-index: 1; }
#screen-chats.hidden { display: none; }

/* ═══════════════════════════════════════════════════════════════
   AUTH SCREEN
═══════════════════════════════════════════════════════════════ */
#screen-auth {
  align-items: center; justify-content: center; padding: 28px 24px;
  background:
    radial-gradient(ellipse 60% 40% at 20% 15%, rgba(0,212,255,.10), transparent),
    radial-gradient(ellipse 50% 50% at 80% 85%, rgba(124,58,237,.10), transparent),
    var(--bg);
}

.auth-box { width: 100%; max-width: 380px; }

.auth-logo-wrap {
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
}
.auth-logo {
  width: 80px; height: 80px; border-radius: 50%;
  background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(124,58,237,.15));
  border: 1.5px solid var(--border-2);
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--glow-cyan), inset 0 0 30px rgba(0,212,255,.05);
  position: relative;
}
.auth-logo::after {
  content: '';
  position: absolute; inset: -1px;
  border-radius: 50%;
  background: conic-gradient(from 0deg, var(--cyan), var(--violet), var(--cyan));
  z-index: -1;
  animation: spin 6s linear infinite;
  opacity: 0.4;
}
@keyframes spin { to { transform: rotate(360deg); } }
.auth-logo-inner {
  width: 74px; height: 74px; border-radius: 50%;
  background: var(--bg-1);
  display: flex; align-items: center; justify-content: center;
  font-size: 32px;
}

.auth-title {
  font-size: 26px; font-weight: 700; text-align: center;
  background: linear-gradient(135deg, var(--cyan), var(--violet));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px; letter-spacing: -.5px;
}
.auth-sub {
  color: var(--text-2); font-size: 14px; text-align: center;
  margin-bottom: 30px; line-height: 1.5;
}

.field { position: relative; margin-bottom: 12px; }
.field input {
  width: 100%; padding: 15px 18px;
  border-radius: var(--r-md);
  background: var(--bg-2);
  border: 1.5px solid var(--border);
  color: var(--text); font-size: 15px; outline: none;
  font-family: inherit;
  transition: border-color .2s, box-shadow .2s;
}
.field input:focus {
  border-color: var(--cyan-dim);
  box-shadow: 0 0 0 3px rgba(0,212,255,.08);
}
.field input::placeholder { color: var(--text-3); }

.btn-primary {
  width: 100%; padding: 15px;
  border-radius: var(--r-md);
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet));
  color: #fff; font-weight: 700; font-size: 15px;
  margin-top: 6px;
  box-shadow: var(--glow-btn);
  transition: transform .1s, opacity .15s, box-shadow .15s;
  font-family: inherit;
  position: relative; overflow: hidden;
}
.btn-primary::before {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
  opacity: 0; transition: opacity .15s;
}
.btn-primary:active { transform: scale(.97); }
.btn-primary:hover::before { opacity: 1; }
.btn-primary:disabled { opacity: .45; pointer-events: none; }

.auth-switch {
  margin-top: 20px; font-size: 13.5px; color: var(--text-2); text-align: center;
}
.auth-switch b { color: var(--cyan); font-weight: 600; cursor: pointer; }
.auth-error { color: var(--danger); font-size: 13px; min-height: 18px; margin-top: 8px; text-align: center; }

/* ═══════════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════════ */
.topbar {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 10px 10px 14px;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.topbar-title { flex: 1; font-size: 20px; font-weight: 700; letter-spacing: -.3px; }
.topbar-sub { font-size: 11px; color: var(--text-2); font-weight: 400; }

/* Icon Buttons — SVG-powered */
.icon-btn {
  width: 40px; height: 40px; border-radius: var(--r-full);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; color: var(--text-2);
  transition: background .15s, color .15s;
  position: relative;
}
.icon-btn:active { background: rgba(0,212,255,.10); color: var(--cyan); }
.icon-btn svg { width: 22px; height: 22px; }

/* ═══════════════════════════════════════════════════════════════
   TABS
═══════════════════════════════════════════════════════════════ */
.tabs {
  display: flex;
  background: var(--bg-1);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.tab {
  flex: 1; text-align: center; padding: 11px 0;
  font-size: 14px; font-weight: 600; color: var(--text-2);
  position: relative; transition: color .15s; cursor: pointer;
}
.tab.active { color: var(--cyan); }
.tab .underline {
  position: absolute; bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 40px; height: 2.5px; border-radius: 2px;
  background: var(--cyan);
  opacity: 0; transition: opacity .2s;
  box-shadow: 0 0 8px var(--cyan);
}
.tab.active .underline { opacity: 1; }

/* ═══════════════════════════════════════════════════════════════
   CHAT LIST
═══════════════════════════════════════════════════════════════ */
#chatList { flex: 1; }

.chat-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.025);
  transition: background .12s;
  position: relative;
}
.chat-row:active { background: rgba(0,212,255,.04); }

.avatar {
  width: 52px; height: 52px; border-radius: 50%;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 20px; font-weight: 700; color: #fff;
  position: relative; overflow: visible;
}
.avatar-inner {
  width: 100%; height: 100%; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.avatar .dot-online {
  position: absolute; bottom: 1px; left: 1px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--green); border: 2.5px solid var(--bg);
  display: none; box-shadow: 0 0 6px var(--green);
}
.avatar.online .dot-online { display: block; }

.chat-meta { flex: 1; min-width: 0; }
.chat-top {
  display: flex; justify-content: space-between;
  align-items: baseline; gap: 8px;
}
.chat-name {
  font-size: 15px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-time { font-size: 11px; color: var(--text-3); flex-shrink: 0; }
.chat-bottom {
  display: flex; justify-content: space-between;
  align-items: center; gap: 8px; margin-top: 3px;
}
.chat-preview {
  font-size: 13px; color: var(--text-2);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.chat-badge {
  background: var(--cyan); color: #001a22; font-size: 11px;
  font-weight: 700; min-width: 20px; height: 20px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  padding: 0 6px; flex-shrink: 0; box-shadow: 0 0 8px rgba(0,212,255,.4);
}

.empty-hint {
  text-align: center; color: var(--text-2);
  font-size: 14px; padding: 64px 32px; line-height: 2;
}
.empty-hint .empty-icon {
  font-size: 48px; display: block; margin-bottom: 16px; opacity: .5;
}

/* ── FAB ──────────────────────────────────────────────────────── */
.fab {
  position: absolute; bottom: 20px; left: 18px;
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet));
  color: #fff; display: flex; align-items: center; justify-content: center;
  box-shadow: var(--glow-btn); z-index: 8;
  transition: transform .12s, box-shadow .15s;
}
.fab:active { transform: scale(.90); box-shadow: none; }
.fab svg { width: 24px; height: 24px; }

/* ═══════════════════════════════════════════════════════════════
   CHAT SCREEN
═══════════════════════════════════════════════════════════════ */
#screen-chat {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 80% 60% at 10% 5%, rgba(0,212,255,.04), transparent),
    radial-gradient(ellipse 60% 60% at 90% 95%, rgba(124,58,237,.04), transparent);
}

.chat-header {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; background: var(--bg-1);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.chat-header .avatar { width: 40px; height: 40px; font-size: 16px; }
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-name {
  font-size: 16px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.chat-header-status { font-size: 12px; color: var(--text-2); margin-top: 1px; }
.chat-header-status.online { color: var(--green); }

#msgList {
  flex: 1; padding: 10px 10px 6px;
  display: flex; flex-direction: column; gap: 2px;
}
.day-sep {
  align-self: center; background: rgba(0,212,255,.06);
  color: var(--text-2); font-size: 12px;
  padding: 4px 14px; border-radius: var(--r-full);
  margin: 12px 0; border: 1px solid var(--border);
}
.msg-row { display: flex; max-width: 80%; margin: 2px 0; }
.msg-row.out { align-self: flex-end; flex-direction: row-reverse; }
.msg-row.in  { align-self: flex-start; }

.bubble {
  padding: 8px 11px 9px;
  border-radius: 16px; position: relative;
  font-size: 14.5px; line-height: 1.5;
  word-wrap: break-word; overflow-wrap: anywhere;
}
.msg-row.out .bubble {
  background: var(--bubble-out);
  border-bottom-left-radius: 4px;
  border: 1px solid rgba(0,212,255,.08);
}
.msg-row.in .bubble {
  background: var(--bubble-in);
  border-bottom-right-radius: 4px;
  border: 1px solid rgba(255,255,255,.04);
}
.bubble .sender {
  font-size: 12px; font-weight: 700;
  color: var(--cyan); margin-bottom: 3px;
}
.bubble .txt { white-space: pre-wrap; }
.bubble .meta {
  display: flex; justify-content: flex-end; align-items: center;
  gap: 3px; margin-top: 4px;
  font-size: 10.5px; color: rgba(255,255,255,.4);
  float: left;
}
.bubble .meta .tick { color: var(--cyan); opacity: .8; }
.bubble img.msg-img {
  max-width: 230px; max-height: 280px;
  border-radius: 10px; display: block; margin-top: 4px;
  object-fit: cover; cursor: pointer;
}

.voice-msg {
  display: flex; align-items: center; gap: 10px;
  min-width: 190px; padding: 2px;
}
.voice-play {
  width: 36px; height: 36px; border-radius: 50%;
  background: rgba(0,212,255,.15);
  border: 1px solid rgba(0,212,255,.3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background .15s;
  color: var(--cyan);
}
.voice-play:active { background: rgba(0,212,255,.25); }
.voice-play svg { width: 16px; height: 16px; }
.voice-wave { flex: 1; height: 22px; display: flex; align-items: center; gap: 2px; }
.voice-wave span {
  width: 2.5px; background: rgba(0,212,255,.4);
  border-radius: 2px; flex-shrink: 0;
}
.voice-time { font-size: 11px; color: rgba(255,255,255,.5); flex-shrink: 0; }

.typing-bar { padding: 4px 16px; font-size: 12px; color: var(--cyan); min-height: 22px; }

/* ═══════════════════════════════════════════════════════════════
   COMPOSER
═══════════════════════════════════════════════════════════════ */
.composer {
  display: flex; align-items: flex-end; gap: 6px;
  padding: 8px 10px 8px 10px;
  background: var(--bg-1); border-top: 1px solid var(--border);
  flex-shrink: 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}
.composer-input-wrap {
  flex: 1; background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  display: flex; align-items: flex-end;
  padding: 8px 10px; max-height: 120px;
  transition: border-color .2s;
}
.composer-input-wrap:focus-within {
  border-color: rgba(0,212,255,.2);
}
#msgInput {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 15px; resize: none;
  max-height: 100px; line-height: 1.4;
  font-family: inherit; padding: 0;
}
#msgInput::placeholder { color: var(--text-3); }

/* Composer icon buttons — slightly smaller */
.composer .icon-btn { width: 38px; height: 38px; }
.composer .icon-btn svg { width: 20px; height: 20px; }

/* Send / Mic button */
.send-btn {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet));
  color: #fff; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; box-shadow: 0 3px 12px rgba(0,212,255,.3);
  transition: transform .12s, box-shadow .12s;
}
.send-btn:active { transform: scale(.88); box-shadow: none; }
.send-btn svg { width: 18px; height: 18px; }
.send-btn.mic-recording {
  background: var(--danger);
  box-shadow: 0 3px 12px rgba(255,71,87,.4);
  animation: pulse 1.1s infinite;
}
@keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.55;} }

.rec-indicator {
  display: flex; align-items: center; gap: 8px; flex: 1;
  font-size: 13px; color: var(--danger);
}
.rec-dot {
  width: 9px; height: 9px; border-radius: 50%;
  background: var(--danger); animation: pulse 1s infinite;
  flex-shrink: 0;
}

/* ═══════════════════════════════════════════════════════════════
   BOTTOM SHEETS
═══════════════════════════════════════════════════════════════ */
.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px);
  z-index: 30; opacity: 0; pointer-events: none;
  transition: opacity .22s;
}
.sheet-overlay.show { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: 22px 22px 0 0;
  z-index: 31;
  transform: translateY(100%);
  transition: transform .26s cubic-bezier(.4, 0, .2, 1);
  max-height: 80vh; display: flex; flex-direction: column;
  padding-bottom: max(16px, env(safe-area-inset-bottom));
  overflow: hidden;
}
.sheet.show { transform: translateY(0); }

.sheet-handle {
  width: 36px; height: 4px; background: var(--text-3);
  border-radius: 3px; margin: 12px auto 6px;
  flex-shrink: 0;
}
.sheet-header {
  padding: 0 18px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sheet-user-name {
  font-size: 17px; font-weight: 700; text-align: center;
  color: var(--text); margin-bottom: 2px;
}
.sheet-user-tag {
  font-size: 12px; color: var(--cyan); text-align: center;
}

.sheet-body { overflow-y: auto; flex: 1; }

.sheet-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 18px; font-size: 15px; cursor: pointer;
  transition: background .12s; color: var(--text);
}
.sheet-item:active { background: rgba(0,212,255,.05); }
.sheet-item-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--bg-3);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 0;
}
.sheet-item-icon svg { width: 18px; height: 18px; color: var(--text-2); }
.sheet-item.danger { color: var(--danger); }
.sheet-item.danger .sheet-item-icon { background: rgba(255,71,87,.1); }
.sheet-item.danger .sheet-item-icon svg { color: var(--danger); }
.sheet-item-label { flex: 1; }
.sheet-item-value { font-size: 13px; color: var(--text-2); }

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(6px);
  z-index: 40; display: none;
  align-items: center; justify-content: center; padding: 20px;
}
.modal-overlay.show { display: flex; }

.modal-box {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  width: 100%; max-width: 360px;
  padding: 22px 20px;
  box-shadow: 0 24px 60px rgba(0,0,0,.5);
  animation: modal-in .2s ease;
}
@keyframes modal-in {
  from { transform: scale(.92) translateY(10px); opacity: 0; }
  to   { transform: scale(1) translateY(0); opacity: 1; }
}
.modal-title {
  font-size: 17px; font-weight: 700; margin-bottom: 16px;
  text-align: center; color: var(--text);
}
.modal-box input, .modal-box textarea {
  width: 100%; padding: 13px 14px; border-radius: var(--r-sm);
  background: var(--bg-3); border: 1.5px solid var(--border);
  color: var(--text); font-size: 14.5px; margin-bottom: 10px;
  outline: none; font-family: inherit;
  transition: border-color .15s;
}
.modal-box input:focus, .modal-box textarea:focus {
  border-color: var(--cyan-dim);
}
.kind-toggle { display: flex; gap: 8px; margin-bottom: 12px; }
.kind-toggle button {
  flex: 1; padding: 10px; border-radius: var(--r-sm);
  background: var(--bg-3); font-size: 13px; font-weight: 600;
  color: var(--text-2); transition: all .15s; font-family: inherit;
}
.kind-toggle button.sel {
  background: linear-gradient(135deg, rgba(0,212,255,.15), rgba(124,58,237,.15));
  color: var(--cyan); border: 1px solid var(--border-2);
}
.modal-actions { display: flex; gap: 10px; margin-top: 8px; }
.modal-actions button {
  flex: 1; padding: 13px; border-radius: var(--r-sm);
  font-size: 14.5px; font-weight: 700; font-family: inherit;
  transition: opacity .15s, transform .1s;
}
.modal-actions button:active { transform: scale(.97); }
.modal-btn-cancel {
  background: var(--bg-3); color: var(--text-2);
  border: 1px solid var(--border);
}
.modal-btn-ok {
  background: linear-gradient(135deg, var(--cyan-dim), var(--violet));
  color: #fff; box-shadow: 0 4px 16px rgba(0,212,255,.25);
}

/* ── Image Viewer ────────────────────────────────────────────── */
.img-viewer {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.94); z-index: 50;
  display: none; align-items: center; justify-content: center;
}
.img-viewer.show { display: flex; }
.img-viewer img {
  max-width: 92%; max-height: 85%;
  border-radius: 10px; object-fit: contain;
}
.img-viewer .close-x {
  position: absolute; top: 16px; left: 16px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,.12);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px;
}

/* ── Toast ───────────────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 88px; left: 50%;
  transform: translateX(-50%);
  background: var(--bg-2); border: 1px solid var(--border);
  color: var(--text); padding: 10px 18px; border-radius: var(--r-md);
  font-size: 13.5px; z-index: 60; opacity: 0;
  transition: opacity .25s, bottom .25s;
  pointer-events: none; max-width: 85%; text-align: center;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}
.toast.show { opacity: 1; bottom: 108px; }

/* ── Connection status bar ────────────────────────────────────── */
.conn-bar {
  position: fixed; top: 0; left: 0; right: 0;
  padding: 6px 16px; font-size: 12px; text-align: center;
  z-index: 100; transition: all .3s;
  transform: translateY(-100%);
}
.conn-bar.show { transform: translateY(0); }
.conn-bar.offline { background: var(--danger); color: #fff; }
.conn-bar.reconnecting { background: var(--warn); color: #000; }

.hidden { display: none !important; }

/* ── Neon glow on room type badges ──────────────────────────── */
.room-kind-badge {
  font-size: 10px; color: var(--text-3);
  background: var(--bg-3); padding: 2px 6px;
  border-radius: var(--r-full); font-weight: 600;

}

/* ── Swipe indicator on chat screen ─────────────────────────── */
.chat-header .icon-btn:first-child svg {
  transform: scaleX(-1); /* flip back arrow for RTL */
}
</style>

<!-- ══════════════════════════════════════════════════════════════════
  NEXUS Chat — Frontend Logic
═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

/* ── Globals ──────────────────────────────────────────────────── */
const API = '';
let TOKEN  = localStorage.getItem('nexus_token') || '';
let ME     = JSON.parse(localStorage.getItem('nexus_user') || 'null');
let socket = null;
let currentRoom    = null;
let rooms          = [];
let activeTab      = 'all';
let typingTimeout  = null;
let typingTimers   = {};
let presenceMap    = {};
let mediaRecorder  = null, recordedChunks = [], recordStart = 0, recordInterval = null;
let isRecording    = false;
let lastDayLabel   = '';
let notifOn        = localStorage.getItem('nexus_notif') !== 'off';

const $ = id => document.getElementById(id);
const esc = s => (s || '').replace(/[&<>"']/g,
  c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ── Touch event guards ───────────────────────────────────────── */
document.addEventListener('touchmove', e => { if(e.touches.length > 1) e.preventDefault(); }, {passive:false});
let lastTouch = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if(now - lastTouch <= 300) e.preventDefault();
  lastTouch = now;
}, {passive:false});
document.addEventListener('gesturestart', e => e.preventDefault());

/* ── Toast ────────────────────────────────────────────────────── */
function toast(msg) {
  const t = $('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ── Connection status bar ────────────────────────────────────── */
function setConnBar(state, msg) {
  const bar = $('connBar');
  bar.className = 'conn-bar show ' + (state || '');
  bar.textContent = msg;
  if(state === '') {
    setTimeout(() => bar.classList.remove('show'), 1800);
  }
}

/* ── Screen transitions ───────────────────────────────────────── */
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

/* ── Sheets ───────────────────────────────────────────────────── */
function openSheet(sheetId, overlayId) {
  $(overlayId).classList.add('show');
  $(sheetId).classList.add('show');
}
function closeSheet(sheetId, overlayId) {
  $(overlayId).classList.remove('show');
  $(sheetId).classList.remove('show');
}
['sideOverlay','chatMenuOverlay','fabOverlay'].forEach(ov => {
  $(ov).addEventListener('click', () => {
    if(ov === 'sideOverlay')    closeSheet('sideSheet',    'sideOverlay');
    if(ov === 'chatMenuOverlay') closeSheet('chatMenuSheet','chatMenuOverlay');
    if(ov === 'fabOverlay')     closeSheet('fabSheet',     'fabOverlay');
  });
});

/* ── Avatars ──────────────────────────────────────────────────── */
const COLORS = ['#0099bb','#7c3aed','#059669','#d97706','#dc2626','#0891b2','#db2777'];
function avatarColorFor(seed) {
  let h = 0;
  for(const c of (seed || '?')) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return COLORS[h % COLORS.length];
}
function initialOf(name) { return (name || '?').trim().charAt(0).toUpperCase(); }

function renderAvatar(el, name, emoji, color, online) {
  const inner = el.querySelector('.avatar-inner') || el;
  inner.style.background = emoji
    ? 'linear-gradient(135deg, #162234, #0d1520)'
    : (color || avatarColorFor(name));
  inner.textContent = (emoji && emoji !== '#') ? emoji : initialOf(name);

  let dot = el.querySelector('.dot-online');
  if(!dot) { dot = document.createElement('div'); dot.className = 'dot-online'; el.appendChild(dot); }
  el.classList.toggle('online', !!online);
}

/* ── Time helpers ─────────────────────────────────────────────── */
function timeAgo(iso) {
  if(!iso) return '';
  const d = new Date(iso), now = new Date();
  if(d.toDateString() === now.toDateString())
    return d.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
  const days = Math.floor((now - d) / 86400000);
  if(days === 1) return 'أمس';
  if(days < 7)  return d.toLocaleDateString('ar-EG', {weekday:'long'});
  return d.toLocaleDateString('ar-EG', {day:'numeric', month:'numeric'});
}
function dayLabel(iso) {
  const d = new Date(iso), now = new Date();
  if(d.toDateString() === now.toDateString()) return 'اليوم';
  const y = new Date(now); y.setDate(now.getDate() - 1);
  if(d.toDateString() === y.toDateString()) return 'أمس';
  return d.toLocaleDateString('ar-EG', {day:'numeric', month:'long', year:'numeric'});
}

/* ── API fetch wrapper ────────────────────────────────────────── */
async function api(path, opts = {}) {
  opts.headers = Object.assign({'Content-Type':'application/json'}, opts.headers || {});
  if(TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  const res  = await fetch(API + path, opts);
  let data   = {};
  try { data = await res.json(); } catch(e) {}
  if(!res.ok) throw new Error(data.error || 'حدث خطأ');
  return data;
}

/* ══════════════════════════════════════════════════════════════
   AUTH
══════════════════════════════════════════════════════════════ */
let authMode = 'login';

$('switchToRegister').addEventListener('click', () => {
  authMode = authMode === 'login' ? 'register' : 'login';
  const isLogin = authMode === 'login';
  $('switchToRegister').textContent = isLogin ? 'إنشاء حساب جديد' : 'تسجيل الدخول';
  $('btnAuthSubmit').textContent    = isLogin ? 'تسجيل الدخول'     : 'إنشاء حساب';
  $('authSub').textContent          = isLogin ? 'مراسلة آمنة ومشفّرة بالكامل' : 'أنشئ حسابك في ثوانٍ';
  $('authErr').textContent = '';

async function doAuth() {
  const username = $('inUser').value.trim();
  const password = $('inPass').value;
  $('authErr').textContent = '';
  if(username.length < 3) { $('authErr').textContent = 'اسم المستخدم قصير جدًا'; return; }
  if(password.length < 6) { $('authErr').textContent = 'كلمة المرور يجب أن تكون 6 أحرف+'; return; }
  $('btnAuthSubmit').disabled = true;
  try {
    const path = authMode === 'login' ? '/api/login' : '/api/register';
    const data = await api(path, {method:'POST', body: JSON.stringify({username, password})});
    TOKEN = data.token; ME = data.user;
    localStorage.setItem('nexus_token', TOKEN);
    localStorage.setItem('nexus_user', JSON.stringify(ME));
    boot();
  } catch(e) {
    $('authErr').textContent = e.message;
  } finally {
    $('btnAuthSubmit').disabled = false;
  }
}

function renderChatList(filter = '') {
  const list = $('chatList');
  let data = rooms.slice();
  if(activeTab === 'dm')     data = data.filter(r => r.kind === 'dm');
  if(activeTab === 'groups') data = data.filter(r => r.kind === 'group' || r.kind === 'channel' || r.kind === 'public');
  if(filter) data = data.filter(r => (r.name || '').toLowerCase().includes(filter));

  if(data.length === 0) {
    const icons = {dm:'💬', groups:'👥', all:'💬'};
    list.innerHTML = `<div class="empty-hint">
      <span class="empty-icon">${icons[activeTab] || '💬'}</span>

    const row = document.createElement('div');

    const kindBadge = r.kind === 'channel' ? '<span class="room-kind-badge">قناة</span>' :

                      r.kind === 'public'  ? '<span class="room-kind-badge">عام</span>' : '';

        <div class="dot-online"></div>
      </div>
      <div class="chat-meta">
        <div class="chat-top">
          <div class="chat-name">${esc(r.name)} ${kindBadge}</div>
          <div class="chat-time">${timeAgo(r.preview_at || r.created_at)}</div>

        </div>
      </div>`;

    renderAvatar(row.querySelector('.avatar'), r.name, r.emoji, avatarColorFor(r.id), online);

/* ══════════════════════════════════════════════════════════════
   MESSAGES — append & render
══════════════════════════════════════════════════════════════ */
function appendMessage(m, scroll = true) {
  const list = $('msgList');
  const dl = dayLabel(m.created_at);
  if(dl !== lastDayLabel) {
    const sep = document.createElement('div');
    sep.className = 'day-sep'; sep.textContent = dl;
    list.appendChild(sep); lastDayLabel = dl;
  }
  const out = m.user && m.user.id === ME.id;
  const row = document.createElement('div');
  row.className = 'msg-row ' + (out ? 'out' : 'in');

  const timeStr = new Date(m.created_at).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
  let inner = '';

  if(!out && currentRoom && currentRoom.kind !== 'dm') {
    inner += `<div class="sender">${esc(m.user ? m.user.username : '؟')}</div>`;
  }

  if(m.kind === 'image') {
    inner += `<img class="msg-img" src="${m.text}" loading="lazy" alt="صورة">`;
  } else if(m.kind === 'voice') {
    const bars = Array.from({length:24}, () => 4 + Math.floor(Math.random() * 16));
    inner += `<div class="voice-msg">
      <button class="voice-play" data-play>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
      </button>
      <div class="voice-wave">${bars.map(h => `<span style="height:${h}px"></span>`).join('')}</div>
      <div class="voice-time">${m.duration || 0}ث</div>
      <audio data-audio src="${m.text}" preload="none"></audio>
    </div>`;
  } else {
    inner += `<div class="txt">${esc(m.text)}</div>`;
  }

  inner += `<div class="meta">
    <span>${timeStr}</span>
    ${out ? `<span class="tick">
      <svg viewBox="0 0 16 10" width="14" height="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,5 5,9 15,1"/><polyline points="7,5 11,9" opacity=".5"/>
      </svg>
    </span>` : ''}
  </div>`;

  row.innerHTML = `<div class="bubble">${inner}</div>`;

  // Voice play/pause
  const playBtn = row.querySelector('[data-play]');
  if(playBtn) {
    const audio = row.querySelector('[data-audio]');
    const playIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    const pauseIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    playBtn.addEventListener('click', () => {
      if(audio.paused) { audio.play(); playBtn.innerHTML = pauseIcon; }
      else { audio.pause(); playBtn.innerHTML = playIcon; }
    });
    audio.addEventListener('ended', () => { playBtn.innerHTML = playIcon; });
  }

  // Image tap to fullscreen
  const img = row.querySelector('.msg-img');
  if(img) {
    img.addEventListener('click', () => {
      $('imgViewerImg').src = img.src;
      $('imgViewer').classList.add('show');
    });
  }

  list.appendChild(row);
  if(scroll) scrollToBottom();
}

function scrollToBottom() {
  const list = $('msgList');
  requestAnimationFrame(() => { list.scrollTop = list.scrollHeight; });
  setTimeout(() => { list.scrollTop = list.scrollHeight; }, 80);
}

function getInput() { return document.getElementById('msgInput'); }

function updateSendIcon() {
  const el = getInput();
  const hasText = el && el.value.trim().length > 0;
  $('icSend').style.display = hasText ? '' : 'none';
  $('icMic').style.display  = hasText ? 'none' : '';

function sendText() {
  const el = getInput(); if(!el) return;
  const text = el.value.trim();
  if(!text || !currentRoom || !socket) return;
  socket.emit('msg', {rid: currentRoom.id, kind:'text', text});
  el.value = ''; el.style.height = 'auto';
  updateSendIcon();
}

function bindInputEvents(el) {
  el.addEventListener('input', () => {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
    updateSendIcon();
    if(currentRoom && socket) {
      socket.emit('typing', {rid: currentRoom.id, on: true});
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => socket.emit('typing', {rid: currentRoom.id, on: false}), 1500);
    }
  });
  el.addEventListener('keydown', e => {
    if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
  });
}

/* ══════════════════════════════════════════════════════════════
   VOICE RECORDING
══════════════════════════════════════════════════════════════ */
async function toggleRecording() {
  if(isRecording) { stopRecording(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    recordedChunks = [];
    const mimeType = MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm' : '';
    mediaRecorder = new MediaRecorder(stream, mimeType ? {mimeType} : undefined);
    mediaRecorder.ondataavailable = e => { if(e.data.size > 0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(recordedChunks, {type: mediaRecorder.mimeType || 'audio/webm'});
      const duration = Math.round((Date.now() - recordStart) / 1000);
      if(duration < 1) { toast('الرسالة قصيرة جدًا'); return; }
      const reader = new FileReader();
      reader.onload = () => {
        if(currentRoom && socket)
          socket.emit('msg', {rid: currentRoom.id, kind:'voice', text: reader.result, duration});
      };
      reader.readAsDataURL(blob);
    };
    mediaRecorder.start();
    recordStart = Date.now();
    isRecording = true;
    showRecordingUI(true);
  } catch(e) { toast('تعذّر الوصول إلى الميكروفون'); }
}

function stopRecording() {
  if(mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  isRecording = false;
  showRecordingUI(false);
}

function showRecordingUI(on) {
  const wrap = document.querySelector('.composer-input-wrap');
  const btn  = $('btnSendOrMic');
  btn.classList.toggle('mic-recording', on);
  if(on) {
    let secs = 0;
    wrap.innerHTML = `<div class="rec-indicator">
      <span class="rec-dot"></span>
      <span id="recTimer">00:00</span>
      <span style="color:var(--text-2);margin-right:auto;font-size:13px;">جارٍ التسجيل — اضغط للإيقاف</span>
    </div>`;
    recordInterval = setInterval(() => {
      secs++;
      const m = String(Math.floor(secs/60)).padStart(2,'0');
      const s = String(secs % 60).padStart(2,'0');
      const t = $('recTimer'); if(t) t.textContent = `${m}:${s}`;
    }, 1000);
  } else {
    clearInterval(recordInterval);
    wrap.innerHTML = `<textarea id="msgInput" placeholder="اكتب رسالة..." rows="1"></textarea>`;
    bindInputEvents(document.getElementById('msgInput'));
    updateSendIcon();
  }
}

/* ══════════════════════════════════════════════════════════════
   SOCKET.IO
══════════════════════════════════════════════════════════════ */
function connectSocket() {
  // prefer websocket, fallback to polling (works on Railway)
  socket = io({
    transports: ['websocket', 'polling'],
    reconnection: true,
    reconnectionAttempts: Infinity,
    reconnectionDelay: 1000,
    reconnectionDelayMax: 8000,
  });

  socket.on('connect', () => {
    socket.emit('auth', {token: TOKEN});
    setConnBar('', '');
  });

  socket.on('connect_error', () => {
    setConnBar('reconnecting', '⚡ جارٍ إعادة الاتصال...');
  });

  socket.on('disconnect', reason => {
    if(reason !== 'io client disconnect')
      setConnBar('offline', '⚠️ انقطع الاتصال');
  });

  socket.on('ready', u => {
    ME = u;
    localStorage.setItem('nexus_user', JSON.stringify(ME));
    // rejoin current room after reconnect
    if(currentRoom) socket.emit('join', {rid: currentRoom.id});
  });

  socket.on('err', e => {
    if(e.msg === 'media_too_large') toast('الملف كبير جدًا');
    if(e.msg === 'auth_failed')     toast('خطأ في المصادقة');
  });

  socket.on('msg', m => {
    if(currentRoom && m.room_id === currentRoom.id) {
      appendMessage(m, true);
    } else {
      if(notifOn) {
        const preview = m.kind === 'text' ? m.text.slice(0,40)
                      : m.kind === 'image' ? '📷 صورة'
                      : '🎤 رسالة صوتية';
        toast((m.user ? m.user.username : 'رسالة جديدة') + ': ' + preview);
      }
    }
    loadRooms();
  });

  socket.on('typing', d => {
    if(!currentRoom || d.rid !== currentRoom.id) return;
    clearTimeout(typingTimers[d.uid]);
    if(d.on) {
      $('typingBar').textContent = `${d.name} يكتب الآن...`;
      typingTimers[d.uid] = setTimeout(() => { $('typingBar').textContent = ''; }, 2500);
    } else {
      $('typingBar').textContent = '';
    }
  });

  socket.on('presence', d => {
    presenceMap[d.uid] = d.online;
    if(currentRoom?.peer?.id === d.uid) {
      updateHeaderStatus(currentRoom, d.online);
      renderAvatar($('chatHeaderAvatar'), currentRoom.name, currentRoom.emoji, avatarColorFor(currentRoom.id), d.online);
    }
    renderChatList();
  });
}

/* ══════════════════════════════════════════════════════════════
   BOOT
══════════════════════════════════════════════════════════════ */
function boot() {
  if(!TOKEN || !ME) { showScreen('screen-auth'); return; }
  showScreen('screen-chats');
  connectSocket();
  loadRooms();
}

boot();

/* PWA service worker */
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
